{% extends "base.html" %}
{% block title %}Add contact · {{ client.name }}{% endblock %}
{% block content %}
<a href="{% url 'clients:detail' client.pk %}" class="text-sm text-slate-500 mb-3 inline-block">← Back</a>
<h1 class="text-2xl font-bold text-slate-900 mb-4">Add contact at {{ client.name }}</h1>
<div class="card max-w-xl"><div class="card-body">
<form method="post" class="space-y-4">{% csrf_token %}
  {% for field in form %}
    <div><label class="field-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<p class="form-error">{{ field.errors.0 }}</p>{% endif %}</div>
  {% endfor %}
  <div class="flex justify-end gap-2"><a href="{% url 'clients:detail' client.pk %}" class="btn btn-secondary">Cancel</a><button class="btn btn-primary">Save</button></div>
</form>
</div></div>
{% endblock %}
