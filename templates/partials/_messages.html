{% if messages %}
  <div class="space-y-2 mb-4" x-data="{ visible: true }" x-show="visible">
    {% for message in messages %}
      <div class="toast
                  {% if message.tags == 'error' %}toast-error
                  {% elif message.tags == 'success' %}toast-success
                  {% elif message.tags == 'warning' %}toast-warning
                  {% else %}toast-info{% endif %}">
        <svg class="toast-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          {% if message.tags == 'error' %}<circle cx="10" cy="10" r="8"/><line x1="10" y1="6" x2="10" y2="11"/><circle cx="10" cy="14" r="0.5" fill="currentColor"/>
          {% elif message.tags == 'success' %}<circle cx="10" cy="10" r="8"/><polyline points="6 10 9 13 14 7"/>
          {% elif message.tags == 'warning' %}<path d="M10 2 18 17 2 17z"/><line x1="10" y1="8" x2="10" y2="12"/><circle cx="10" cy="14.5" r="0.5" fill="currentColor"/>
          {% else %}<circle cx="10" cy="10" r="8"/><line x1="10" y1="9" x2="10" y2="14"/><circle cx="10" cy="6" r="0.5" fill="currentColor"/>
          {% endif %}
        </svg>
        <div class="flex-1">{{ message }}</div>
        <button @click="visible = false" class="text-soft hover:text-slate-700" aria-label="Dismiss">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
