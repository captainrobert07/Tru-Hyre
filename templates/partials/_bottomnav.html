{% if nav_items %}
<nav class="shell-bottomnav">
  <ul class="bottomnav-list list-none">
    {% for item in nav_items %}
      <li>
        <a href="{{ item.url }}" class="bottomnav-item {% if item.active %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">{{ item.icon|safe }}</svg>
          <span>{{ item.label }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
{% endif %}
