{% comment %}Horizontal pipeline strip. Args: stage_counts (list of {stage,label,css,count}){% endcomment %}
<div class="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0">
  <ol class="flex gap-2 sm:gap-3 min-w-full list-none">
    {% for s in stage_counts %}
      <li class="flex-1 min-w-[140px]">
        <div class="card card-hover p-4">
          <div class="text-[11px] tracking-wide text-soft uppercase">{{ s.label }}</div>
          <div class="text-2xl font-semibold text-slate-900 mt-1 tabular-nums tracking-tight">{{ s.count }}</div>
          <span class="stage-pill {{ s.css }} mt-2 inline-flex">{{ s.label }}</span>
        </div>
      </li>
    {% endfor %}
  </ol>
</div>
