{% comment %}Horizontal pipeline strip — use for HR/Admin dashboards.
Args: stage_counts (list of {stage,label,css,count}){% endcomment %}
<div class="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0">
  <ol class="flex gap-2 sm:gap-3 min-w-full">
    {% for s in stage_counts %}
      <li class="flex-1 min-w-[120px]">
        <div class="rounded-xl border border-slate-200 bg-white p-3">
          <div class="text-[11px] uppercase tracking-wide text-slate-500">{{ s.label }}</div>
          <div class="text-2xl font-bold text-slate-900 mt-1">{{ s.count }}</div>
          <span class="stage-pill {{ s.css }} mt-2">{{ s.label }}</span>
        </div>
      </li>
    {% endfor %}
  </ol>
</div>
