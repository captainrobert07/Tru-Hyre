{% comment %}Args: title, sub (optional), action_url (optional), action_label (optional){% endcomment %}
<div class="empty">
  <div class="empty-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </div>
  <div class="empty-title">{{ title|default:"Nothing here yet" }}</div>
  {% if sub %}<p class="empty-sub">{{ sub }}</p>{% endif %}
  {% if action_url %}
    <a href="{{ action_url }}" class="btn btn-primary mt-4">{{ action_label|default:"Get started" }}</a>
  {% endif %}
</div>
