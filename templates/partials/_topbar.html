{% load static %}
<header class="sticky top-0 z-30 bg-white/95 backdrop-blur border-b border-slate-200">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8 h-14">
    <a href="{% url 'core:home' %}" class="flex items-center gap-2">
      <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-brand text-white font-bold">T</span>
      <span class="font-semibold tracking-tight text-slate-900">{{ SITE_NAME }}</span>
    </a>
    <div class="flex items-center gap-3">
      <a href="{% url 'notifications:list' %}" class="relative inline-flex h-9 w-9 items-center justify-center rounded-lg hover:bg-slate-100" aria-label="Notifications">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6z" />
          <path d="M9 16a1 1 0 102 0H9z" />
        </svg>
        {% if unread_notifications_count %}
          <span class="absolute -top-0.5 -right-0.5 inline-flex h-4 min-w-4 items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-semibold text-white">
            {{ unread_notifications_count }}
          </span>
        {% endif %}
      </a>
      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" class="flex items-center gap-2 rounded-lg p-1 hover:bg-slate-100">
          <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-slate-200 text-sm font-semibold text-slate-700">
            {{ user.initials }}
          </span>
        </button>
        <div x-show="open" @click.outside="open = false" x-transition class="absolute right-0 mt-2 w-56 rounded-lg border border-slate-200 bg-white shadow-lg" style="display:none">
          <div class="px-3 py-2 border-b border-slate-100">
            <div class="text-sm font-medium">{{ user.full_name|default:user.email }}</div>
            <div class="text-xs text-slate-500">{{ user.get_role_display }}</div>
          </div>
          <a href="{% url 'core:home' %}" class="block px-3 py-2 text-sm hover:bg-slate-50">Dashboard</a>
          {% if user.is_admin %}
            <a href="{% url 'settings_app:home' %}" class="block px-3 py-2 text-sm hover:bg-slate-50">Settings</a>
          {% endif %}
          <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button class="w-full text-left px-3 py-2 text-sm text-rose-600 hover:bg-rose-50">Sign out</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</header>
