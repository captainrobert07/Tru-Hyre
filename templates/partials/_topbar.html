{% load static %}
<header class="shell-topbar">
  <div class="shell-topbar-inner">
    <a href="{% url 'core:home' %}" class="brand-mark">
      <span class="brand-tile">T</span>
      <span class="hidden sm:inline">{{ SITE_NAME }}</span>
    </a>

    <div class="flex items-center gap-2">
      <a href="{% url 'notifications:list' %}" class="relative inline-flex h-9 w-9 items-center justify-center rounded-lg hover:bg-slate-100 text-slate-700" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        {% if unread_notifications_count %}
          <span class="dot-badge">{{ unread_notifications_count }}</span>
        {% endif %}
      </a>

      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" class="flex items-center gap-2 rounded-lg p-1 hover:bg-slate-100">
          <span class="avatar">{{ user.initials }}</span>
        </button>
        <div x-show="open" @click.outside="open = false" x-transition class="menu-popover" style="display:none">
          <div class="px-2 py-1.5 mb-1">
            <div class="text-sm font-medium text-slate-900">{{ user.full_name|default:user.email }}</div>
            <div class="text-xs text-soft">{{ user.get_role_display }}</div>
          </div>
          <div class="menu-divider"></div>
          <a href="{% url 'core:home' %}" class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
            Dashboard
          </a>
          <a href="{% url 'accounts:change_password' %}" class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Change password
          </a>
          {% if user.is_admin %}
            <a href="{% url 'settings_app:home' %}" class="menu-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36.5.55 1.1.6 1.71"/></svg>
              Settings
            </a>
          {% endif %}
          <div class="menu-divider"></div>
          <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button class="menu-item menu-danger w-full text-left">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Sign out
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</header>
