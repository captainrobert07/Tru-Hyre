{% extends "base.html" %}
{% block title %}Vendors{% endblock %}
{% block content %}
<header class="flex items-center justify-between mb-4"><h1 class="text-2xl font-bold text-slate-900">Vendors</h1><a href="{% url 'vendors:create' %}" class="btn btn-primary btn-sm">Add</a></header>
<form method="get" class="card mb-4"><div class="card-body flex gap-3 items-end"><div class="flex-1"><label class="field-label">Search</label><input type="search" name="q" value="{{ q }}" class="input"/></div><button class="btn btn-primary btn-sm">Filter</button></div></form>
<ul class="grid grid-cols-1 md:grid-cols-2 gap-3 list-none">
  {% for v in vendors %}
    <li class="card card-hover">
      <a href="{% url 'vendors:detail' v.pk %}" class="block p-4 no-underline">
        <h3 class="font-semibold text-slate-900">{{ v.name }}</h3>
        <div class="text-xs text-slate-500 mt-1">{{ v.country|default:'—' }} · {{ v.contact_name|default:'No contact' }}</div>
      </a>
    </li>
  {% empty %}<li class="card p-8 text-center col-span-2 text-slate-500">No vendors yet.</li>{% endfor %}
</ul>
{% endblock %}
