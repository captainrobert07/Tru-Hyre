{% extends "base.html" %}
{% block title %}No role assigned{% endblock %}
{% block content %}
<div class="card max-w-lg mx-auto p-6 text-center">
  <h1 class="text-xl font-semibold text-slate-900">No role assigned</h1>
  <p class="text-slate-600 mt-2">Your account exists but isn't assigned to a role yet. Please contact an administrator.</p>
  <form method="post" action="{% url 'accounts:logout' %}" class="mt-4">
    {% csrf_token %}
    <button class="btn btn-secondary">Sign out</button>
  </form>
</div>
{% endblock %}
