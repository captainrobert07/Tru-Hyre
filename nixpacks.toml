# Railway/Nixpacks build config.

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["python -m pip install --upgrade pip && pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate --noinput && python manage.py seed_users && gunicorn truhyre.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
